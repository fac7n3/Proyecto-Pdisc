<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - Mercado Local</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="Assets/styles/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button class="icon-square" aria-label="bolsa">
        <i class="fa-solid fa-bag-shopping"></i>
      </button>
      <button class="pill-btn">Categorias</button>
      <button class="pill-btn">Ofertas</button>
      <button class="search-pill">Buscar</button>
    </header>

    <main class="login-layout">
      <section class="welcome">
        <h1>Crea tu cuenta con email y contrasena</h1>
      </section>

      <section class="login-card">
        <label for="register-email">Email</label>
        <input id="register-email" type="email" autocomplete="email" />

        <label for="register-password">Contrasena</label>
        <input id="register-password" type="password" autocomplete="new-password" />

        <button id="register-btn" class="continue-btn" type="button">Crear cuenta</button>
        <div class="divider"><span>o</span></div>
        <button id="google-register-btn" class="google-btn" type="button">
          <i class="fa-brands fa-google"></i>
          Crear cuenta con Google
        </button>
        <a class="google-btn" href="./login.html">Ya tengo cuenta</a>
      </section>
    </main>

    <script type="module" src="./register.js"></script>
  </body>
</html>
