<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Baradero Local</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="../Assets/styles/auth.css" />
  </head>
  <body>
    <main class="auth-layout">
      <div class="auth-card">
        <div class="auth-inputs">
          <input id="correo" type="email" placeholder="Correo electrónico" autocomplete="email" class="auth-input" />
          <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password" class="auth-input" />
        </div>
        
        <button id="local-login-btn" class="auth-btn auth-btn-primary" type="button">Iniciar sesión</button>
        
        <div class="auth-forgot">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
        
        <button id="google-login-btn" class="auth-btn auth-btn-outline" type="button">
          Iniciar sesión con Google (log)
        </button>
        
        <a href="./register.html" class="auth-btn auth-btn-ghost">
          Registrarse
        </a>
      </div>
    </main>

    <script type="module" src="../js/login.js"></script>
  </body>
</html>
