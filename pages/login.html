<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Mercado Local</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="../Assets/styles/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button class="icon-square" aria-label="bolsa">
        <i class="fa-solid fa-bag-shopping"></i>
      </button>

      <button class="pill-btn">Categorias</button>
      <button class="pill-btn">Ofertas</button>
      <button class="search-pill">Buscar</button>

      <div class="topbar-icons">
        <button class="icon-btn" aria-label="perfil">
          <i class="fa-regular fa-circle-user"></i>
        </button>
        <button class="icon-btn" aria-label="favoritos">
          <i class="fa-solid fa-heart"></i>
        </button>
        <button class="icon-btn" aria-label="paquetes">
          <i class="fa-solid fa-cube"></i>
        </button>
        <button class="icon-btn" aria-label="carrito">
          <i class="fa-solid fa-cart-shopping"></i>
        </button>
        <button class="icon-btn" aria-label="ayuda">
          <i class="fa-solid fa-question"></i>
        </button>
      </div>
    </header>

    <main class="login-layout">
      <section class="welcome">
        <h1>Ingresa tu email y contrasena para iniciar sesion</h1>
      </section>

      <section class="login-card">
        <label for="correo">Email</label>
        <input id="correo" type="email" autocomplete="email" />

        <label for="password">Contrasena</label>
        <input id="password" type="password" autocomplete="current-password" />

        <button id="local-login-btn" class="continue-btn" type="button">Iniciar sesion</button>
        <div class="divider"><span>o</span></div>
        <button id="google-login-btn" class="google-btn" type="button">
          <i class="fa-brands fa-google"></i>
          Iniciar sesion con Google
        </button>
        <a class="google-btn" href="./register.html">Crear cuenta</a>
      </section>
    </main>

    <script type="module" src="../js/login.js"></script>
  </body>
</html>
