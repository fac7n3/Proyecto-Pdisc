<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Mercado Local</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="Assets/styles/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button class="icon-square" aria-label="bolsa">
        <i class="fa-solid fa-bag-shopping"></i>
      </button>

      <button class="pill-btn">Categorias</button>
      <button class="pill-btn">Ofertas</button>
      <button class="search-pill">Buscar</button>

      <div class="topbar-icons">
        <button class="icon-btn" aria-label="perfil">
          <i class="fa-regular fa-circle-user"></i>
        </button>
        <button class="icon-btn" aria-label="favoritos">
          <i class="fa-solid fa-heart"></i>
        </button>
        <button class="icon-btn" aria-label="paquetes">
          <i class="fa-solid fa-cube"></i>
        </button>
        <button class="icon-btn" aria-label="carrito">
          <i class="fa-solid fa-cart-shopping"></i>
        </button>
        <button class="icon-btn" aria-label="ayuda">
          <i class="fa-solid fa-question"></i>
        </button>
      </div>
    </header>

    <main class="login-layout">
      <section class="welcome">
        <h1>Ingresa tu email o telefono para iniciar sesion</h1>
      </section>

      <section class="login-card">
        <label for="correo">Email o Telefono</label>
        <input id="correo" type="text" />

        <button class="continue-btn">Continuar</button>

        <div class="divider"><span>o</span></div>

        <button id="google-login-btn" class="google-btn" type="button">
          <i class="fa-brands fa-google"></i>
          Iniciar sesion con google
        </button>
      </section>
    </main>
    
    <script src="./l"></script>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const supabaseUrl = "https://otzhdwuaffcplrveuadc.supabase.co";
      const supabasePublishableKey = "sb_publishable_I-uMORwPYM9mcmEasubjYg_R9FmgzGJ";

      const googleLoginBtn = document.getElementById("google-login-btn");

      async function loginWithGoogle() {
        if (!supabasePublishableKey || !supabasePublishableKey.startsWith("sb_publishable_")) {
          alert("Falta configurar la publishable key en login.html");
          return;
        }

        const supabase = createClient(supabaseUrl, supabasePublishableKey);
        const redirectTo = window.location.origin + window.location.pathname;

        const { error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo },
        });

        if (error) {
          console.error(error);
          alert("No se pudo iniciar sesion con Google.");
        }
      }

      googleLoginBtn?.addEventListener("click", loginWithGoogle);
    </script>
  </body>
</html>
